{% extends "base.html" %}
{% block title %}{{ title }} — Bio links{% endblock %}
{% block content %}
<section class="card card--narrow">
  <h1 class="page-title">{{ title }}</h1>
  {% if error %}<p class="error error--box">{{ error }}</p>{% endif %}
  <form method="post" class="stack">
    <label class="field-label">Целевой URL
      <input class="input" type="url" name="destination_url" required
        value="{{ link.destination_url if link else '' }}"
        placeholder="https://rumble.com/c/...">
    </label>
    <label class="field-label">Метка (для себя)
      <input class="input" type="text" name="label" maxlength="255"
        value="{{ link.label if link and link.label else '' }}"
        placeholder="TikTok @user">
    </label>
    {% if link %}
    <p class="muted slug-hint">Slug не меняется: <code class="slug-inline">{{ link.slug }}</code></p>
    {% endif %}
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </form>
</section>
{% endblock %}
