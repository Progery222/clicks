{% extends "base.html" %}
{% block title %}Вход — Bio links{% endblock %}
{% block content %}
<section class="card card--narrow card--login">
  <div class="login-head">
    <div class="login-icon" aria-hidden="true">◇</div>
    <h1 class="page-title">Вход</h1>
    <p class="muted small">Панель управления короткими ссылками</p>
  </div>
  {% if blocked %}
  <p class="error error--box">{{ block_message }}</p>
  {% else %}
  {% if error %}<p class="error error--box">{{ error }}</p>{% endif %}
  <form method="post" action="/admin/login" class="stack">
    <input type="hidden" name="csrf_token" value="{{ get_csrf_token(request) }}">
    <label class="field-label">Пароль
      <input class="input" type="password" name="password" required autocomplete="current-password" placeholder="••••••••">
    </label>
    <button type="submit" class="btn btn-primary btn-block">Войти</button>
  </form>
  {% endif %}
</section>
{% endblock %}
