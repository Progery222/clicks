<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0c1222">
  <title>{% block title %}Bio links{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <header class="top{% if request.session.get('admin') %} top--has-nav{% endif %}" id="site-top">
    <div class="top-row">
      <div class="top-left">
        <button type="button" class="btn-back" id="nav-back" title="Предыдущая страница">← Назад</button>
        <a class="brand" href="/admin">
          <span class="brand__mark" aria-hidden="true"></span>
          <span class="brand__text">Bio links</span>
        </a>
      </div>
      {% if request.session.get('admin') %}
      <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Меню">
        <span class="nav-toggle__bar" aria-hidden="true"></span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
        <span class="nav-toggle__bar" aria-hidden="true"></span>
      </button>
      {% endif %}
    </div>
    {% if request.session.get('admin') %}
    <nav class="nav" id="main-nav" aria-label="Разделы админки">
      <a class="nav-link" href="/admin">Ссылки</a>
      <a class="nav-link" href="/admin/profiles">Профили</a>
      <a class="nav-link nav-link--muted" href="/admin/logout">Выход</a>
    </nav>
    {% endif %}
  </header>
  <main class="main">
    {% block content %}{% endblock %}
  </main>

  <div id="confirm-dialog" class="confirm-dialog" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirm-dialog-title" aria-describedby="confirm-dialog-message">
    <div class="confirm-dialog__backdrop" data-confirm-dismiss tabindex="-1"></div>
    <div class="confirm-dialog__panel">
      <h2 id="confirm-dialog-title" class="confirm-dialog__title"></h2>
      <p id="confirm-dialog-message" class="confirm-dialog__message muted"></p>
      <div class="confirm-dialog__actions">
        <button type="button" class="btn btn-secondary" data-confirm-dismiss>Отмена</button>
        <button type="button" class="btn btn-danger" id="confirm-dialog-ok">Подтвердить</button>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var b = document.getElementById("nav-back");
      if (b) b.addEventListener("click", function () {
        if (window.history.length > 1) window.history.back();
        else window.location.href = "/admin";
      });
      var top = document.getElementById("site-top");
      var toggle = document.getElementById("nav-toggle");
      var nav = document.getElementById("main-nav");
      if (!top || !toggle || !nav) return;
      function setOpen(open) {
        top.classList.toggle("top--nav-open", open);
        toggle.setAttribute("aria-expanded", open ? "true" : "false");
        toggle.setAttribute("aria-label", open ? "Закрыть меню" : "Меню");
      }
      toggle.addEventListener("click", function () {
        setOpen(!top.classList.contains("top--nav-open"));
      });
      nav.querySelectorAll("a").forEach(function (a) {
        a.addEventListener("click", function () { setOpen(false); });
      });
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") setOpen(false);
      });
      var mqWide = window.matchMedia("(min-width: 769px)");
      function closeNavIfWide(e) {
        if (e.matches) setOpen(false);
      }
      if (mqWide.addEventListener) mqWide.addEventListener("change", closeNavIfWide);
      else if (mqWide.addListener) mqWide.addListener(closeNavIfWide);
    })();

    (function () {
      var dlg = document.getElementById("confirm-dialog");
      if (!dlg) return;
      var titleEl = document.getElementById("confirm-dialog-title");
      var msgEl = document.getElementById("confirm-dialog-message");
      var okBtn = document.getElementById("confirm-dialog-ok");
      var pendingForm = null;

      function close() {
        dlg.classList.remove("is-open");
        dlg.setAttribute("aria-hidden", "true");
        document.body.style.overflow = "";
        pendingForm = null;
      }

      function open(form) {
        pendingForm = form;
        titleEl.textContent = form.getAttribute("data-confirm-title") || "Подтвердите";
        msgEl.textContent = form.getAttribute("data-confirm-message") || "";
        okBtn.textContent = form.getAttribute("data-confirm-ok") || "Подтвердить";
        dlg.classList.add("is-open");
        dlg.setAttribute("aria-hidden", "false");
        document.body.style.overflow = "hidden";
        okBtn.focus();
      }

      okBtn.addEventListener("click", function () {
        if (!pendingForm) return;
        var f = pendingForm;
        close();
        f.dataset.confirmed = "1";
        f.requestSubmit();
      });

      dlg.querySelectorAll("[data-confirm-dismiss]").forEach(function (el) {
        el.addEventListener("click", close);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key !== "Escape" || !dlg.classList.contains("is-open")) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        close();
      }, true);

      document.querySelectorAll("form[data-confirm-title]").forEach(function (form) {
        form.addEventListener("submit", function (e) {
          if (form.dataset.confirmed === "1") {
            delete form.dataset.confirmed;
            return;
          }
          e.preventDefault();
          open(form);
        });
      });
    })();
  </script>
</body>
</html>
